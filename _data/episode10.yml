- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸のこと、もう妹としては、
    見られないかも……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    え……

- speaker: 場面
  text: |-
    ——休日。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    はああああ……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    なんであんなこと、
    言っちゃったかなぁ、俺……！

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……っ〜！
    もうマトモに顔を合わせられないかも……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    俺、黒丸のこと……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    お待たせしました。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……うわあっ！？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    どうかされましたか？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    あ、ううん！

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……悪いな。
    休日につき合わせちゃって。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ステージ衣装じゃない、
    イベントで着る私服、

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    どんなものがいいのか、
    客観的な意見が聞きたくて。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    気にしないでください。
    これもプロデューサーの仕事なので。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    うう、ん……
    ……仕事、かぁ。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    では、行きましょうか。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    あ、ああ！

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    こんなのとかどうだ？
    お兄さんっぽい服装ってどういうのだろうな。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    似合ってますよ。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ほ、ほんとか？
    へへ……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    決めた。お前の言う通り、
    これにするよ。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    あ、それから、
    寮で使う日用品も買い足したくて……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    一緒に行きましょう。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……——。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （これって……
    デート……なのか？）

- speaker: 場面
  text: |-
    ——買い物のあと。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸——
    今日はつきあってくれてありがとう。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    いえ、いい気晴らしになりました。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    このお店も、一度来てみたかったんだ。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    スペシャル牛タンカレーが有名……
    なんだけど……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ご心配なく。カロリー計算は、
    こちらでしていますので。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    レッスンで消費するカロリーで、
    相殺できるはずです。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    そ、そんなことまで……！？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    アイドルのコンディションの管理は、
    プロデューサーの仕事ですから。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……じゃあ、遠慮なく。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ああ、そうだ——

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    カレーがくる前に、
    見せたいものがあります。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    じつは先日のステージの、
    独自アンケートを取りまして。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    アンケート……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    少しだけ読み上げますね。
    こほん……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……——。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    「莉波お兄ちゃんに癒されました」
    「お兄さん最高でした！」

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    「莉波お兄さんにコラってされたい！」
    「お兄さん！最推しです！」

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    これはほんの一部ですが……
    とても、いい反響です。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……！！

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    嬉しい……な。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    こんなにたくさんの人が、
    応援してくれて……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸のおかげだな。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    お前だけが、
    俺に声をかけてくれた。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    憧れたアイドルになれなくて——

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    もう、辞めようかなって、
    諦めかけていたのに……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    お客さんの心を掴んだのは、
    あなた自身の魅力です。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    私はあなたの本当の魅力を
    知ってもらう、手助けをしただけです。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    子供の頃の私に、あなたが声をかけて、
    手をとってくれたから——

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    見つけることができたんです。
    姫崎莉波という、素晴らしい才能を。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……黒丸。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    あのな、前に言ったこと——

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    お前のこと、もう妹としては
    見られないって言ったのは……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……わかっています。あなたはもう、
    みんなのお兄さん、ですから——

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    私だけを特別に、妹みたいに扱うのは、
    難しいと思います。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……それ、は……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    けれど、兄と妹の関係は、
    まだ続けましょう。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……え？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    あなたには、まだまだ、
    ポテンシャルがあります。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    その魅力をもっと引き出して——
    夏のH.I.Fを目指しましょう。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    H.I.F……！？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    あの学園の
    『一番星（プリマステラ）』を決める？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    そうです。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    一番星（プリマステラ）になるために、
    訓練を続けていきましょう。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……う、ん。
    訓練……ね。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ああ、わかった。これからも、
    黒丸は俺の妹で——

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    俺は黒丸の、お兄ちゃん。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……はい、よろしくお願いします。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……なぁ、黒丸。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    もし、夏のH.I.Fで——
    俺が『一番星（プリマステラ）』になったら、

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ひとつだけ、
    お願いごとをしてもいいか？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    はい、なんなりと。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……ありがとう。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    じゃあ、俺が『一番星（プリマステラ）』になった、
    そのときは——

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （俺の本当の気持ちを伝えるよ）