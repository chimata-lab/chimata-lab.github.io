- speaker: 場面
  text: |-
    ——ライブ当日。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    すーはー……
    すーはー……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    大丈夫ですか？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    こんな大舞台は初めてだし、
    やっぱり緊張するな……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    集まってくれたファンの皆さんの熱量を
    お兄ちゃんの度量で受け止めてください。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    そうすれば、
    きっとあなたの魅力は伝わるはずです。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……うん。
    頑張ってみるよ。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    （やはり、大舞台となると、
    緊張しているみたいだな……）

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ——姫崎さん。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    は、はいっ！

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    手を、握ってくれませんか？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    えっ？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    担当アイドルの初の大舞台、
    必ず成功させてくれると信じてるのですが、

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    緊張で手が震えてしまって……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    は、はは、仕方ないなぁ……



- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    手、冷たくなっちゃってるな。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    大丈夫。あとはお兄ちゃんに任せとけ。
    絶対成功させてくるからな……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    手、あったかくなってきたな。
    もう大丈夫か？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ありがとうございます……
    姫崎さんは、どうですか？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……うん。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……不思議だな。
    あんなに緊張してたのに。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    お前を励ましてたら、落ち着いてきたよ。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    お兄ちゃんスイッチです。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    あなたは人に頼られ、
    励ましているときが一番お兄さんになれる。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    なので、誰かを励ませば
    お兄ちゃんスイッチが入るかなと。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……そ、そうかも。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    これで緊張がほぐれるようでしたら、
    ライブ前のルーティンにしましょう。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸が緊張しているだけじゃないのか？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    それもあります。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……あるんだ。
    素直でよろしい。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    でも……
    うん、いいかもな。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    どうか自信を持って——

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    集まってくれたファンの皆さんの、
    お兄ちゃんになってください。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    うん……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……もう大丈夫。
    ありがとう。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    見ていてくれ、黒丸。

- speaker: 場面
  text: |-
    ——ステージ。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    みんなーーーーっ！
    今日は観に来てくれてありがとな！

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    俺の歌、一生懸命みんなに届けるから、
    ちゃんと着いてこいよ！

- speaker: 観客
  side: left
  text: |-
    きゃあああああ！！

- speaker: 観客
  side: left
  text: |-
    莉波お兄ちゃ〜〜〜〜ん！！！

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （綺麗な色……）

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （ペンライトの光が、
    星屑みたいにきらめいて——）

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （昔は気づかなかった——
    応援してくれるファンのみんなの顔）

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （今は、ひとりひとりの顔が、
    こんなにもよく見える……）

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （ありがとう、黒丸）

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （お前のお陰で——）

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    （俺はまた、ステージに立てたよ）

- speaker: 場面
  text: |-
    ——ライブ終了後。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    お疲れさまでした。
    最高のパフォーマンスでした。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ありがとう……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    俺——
    みんなのお兄ちゃんになれたか？

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    お客さんの表情でわかります。
    ステージに立つあなたは——

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    演技では決して伝わらない、
    自然体の魅力がありました。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸のお陰だよ。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸が俺を見つけてくれたから——

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    演技じゃない、
    素の自分を出せたんだ。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……でも、少し寂しいですね。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    みんながあなたの魅力に気づいて——

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    もう、私だけのお兄ちゃんじゃ、
    なくなってしまいました。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……——。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……冗談です。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……うん、そうだな。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸のこと、もう妹としては、
    見られないかも……

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……え？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    あ、え、えっと……

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ファンのみんなのお兄ちゃんになったら、

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    黒丸だけを特別扱いには、
    できないなってこと、だ。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    それでいいんです。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    これからは、みんなのお兄ちゃんとして、
    ステージで輝いてください。

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……——。

- speaker: 黒丸
  side: right
  icon: /images/characters/kuromaru.png
  text: |-
    ……あの、どうしたんですか？

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ……〜〜〜っ！

- speaker: 莉波
  side: left
  icon: /images/characters/rinami.png
  text: |-
    ハハ、そうだな……